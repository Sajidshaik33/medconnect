<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Manage Doctors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <style>
        *{font-family:'Inter',sans-serif;}body{background:#f1f5f9;}
        .sidebar{width:260px;min-height:100vh;background:#1e0a3c;position:fixed;top:0;left:0;z-index:100;}
        .sidebar-brand{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
        .sidebar-brand-name{color:white;font-weight:800;font-size:1.1rem;}
        .sidebar-section{padding:20px 12px 8px;}
        .nav-link{color:#c4b5fd!important;padding:10px 12px!important;border-radius:10px;margin-bottom:2px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;transition:all 0.2s;}
        .nav-link:hover{background:rgba(255,255,255,0.06)!important;color:white!important;}
        .nav-link.active{background:rgba(139,92,246,0.2)!important;color:#a78bfa!important;}
        .nav-link .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
        .main-content{margin-left:260px;padding:24px;}
        .topbar{background:white;border-radius:14px;padding:16px 24px;box-shadow:0 1px 10px rgba(0,0,0,0.05);margin-bottom:24px;}
        .table-card{background:white;border-radius:14px;box-shadow:0 1px 10px rgba(0,0,0,0.05);overflow:hidden;}
        .table thead th{background:#f8fafc;color:#64748b;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;border:none;padding:12px 16px;}
        .table tbody td{padding:14px 16px;font-size:14px;color:#374151;border-color:#f1f5f9;vertical-align:middle;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand d-flex align-items-center gap-2">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#8b5cf6,#a78bfa);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;"><i class="fas fa-heartbeat" style="font-size:16px;"></i></div>
        <span class="sidebar-brand-name">MedConnect</span>
    </div>
    <div class="sidebar-section">
        <a th:href="@{/admin/dashboard}" class="nav-link"><span class="icon"><i class="fas fa-tachometer-alt"></i></span>Dashboard</a>
        <a th:href="@{/admin/doctors}" class="nav-link active"><span class="icon"><i class="fas fa-user-md"></i></span>Doctors</a>
        <a th:href="@{/admin/patients}" class="nav-link"><span class="icon"><i class="fas fa-users"></i></span>Patients</a>
        <a th:href="@{/admin/appointments}" class="nav-link"><span class="icon"><i class="fas fa-calendar"></i></span>Appointments</a>
        <a th:href="@{/admin/departments}" class="nav-link"><span class="icon"><i class="fas fa-hospital"></i></span>Departments</a>
    </div>
    <div style="position:absolute;bottom:0;width:100%;padding:16px 12px;">
        <a th:href="@{/logout}" class="nav-link" style="color:#ef4444!important;"><span class="icon"><i class="fas fa-sign-out-alt"></i></span>Logout</a>
    </div>
</div>
<div class="main-content">
    <div class="topbar"><h5 class="fw-bold mb-0" style="color:#0a2540;">Manage Doctors</h5></div>
    <div class="table-card">
        <div class="table-responsive">
            <table class="table mb-0">
                <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Specialization</th><th>Qualification</th><th>Experience</th><th>Fees</th><th>Action</th></tr></thead>
                <tbody>
                    <tr th:each="doc, i : ${doctors}">
                        <td th:text="${i.count}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#10b981,#34d399);display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:700;"
                                     th:text="${doc.user != null ? doc.user.name.substring(0,1).toUpperCase() : 'D'}"></div>
                                <span th:text="${doc.user != null ? doc.user.name : 'N/A'}"></span>
                            </div>
                        </td>
                        <td th:text="${doc.user != null ? doc.user.email : 'N/A'}"></td>
                        <td th:text="${doc.specialization}"></td>
                        <td th:text="${doc.qualification}"></td>
                        <td th:text="${doc.experience + ' yrs'}"></td>
                        <td th:text="${'₹' + doc.fees}"></td>
                        <td><a th:href="@{/admin/delete-doctor/{id}(id=${doc.id})}" class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border-radius:8px;font-size:12px;padding:5px 12px;" onclick="return confirm('Delete?')"><i class="fas fa-trash me-1"></i>Delete</a></td>
                    </tr>
                    <tr th:if="${doctors == null or doctors.empty}"><td colspan="8" class="text-center py-5" style="color:#94a3b8;"><i class="fas fa-user-md fa-2x mb-3 d-block"></i>No doctors found</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

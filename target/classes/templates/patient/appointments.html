<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedConnect — My Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <style>
        *{font-family:'Inter',sans-serif;}body{background:#f1f5f9;}
        .sidebar{width:260px;min-height:100vh;background:#0a2540;position:fixed;top:0;left:0;z-index:100;}
        .sidebar-brand{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
        .sidebar-brand-name{color:white;font-weight:800;font-size:1.1rem;}
        .sidebar-section{padding:20px 12px 8px;}
        .sidebar-section-label{color:#64748b;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:0 8px;margin-bottom:6px;}
        .nav-link{color:#94a3b8!important;padding:10px 12px!important;border-radius:10px;margin-bottom:2px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;transition:all 0.2s;}
        .nav-link:hover{background:rgba(255,255,255,0.06)!important;color:white!important;}
        .nav-link.active{background:rgba(26,86,219,0.3)!important;color:#60a5fa!important;}
        .nav-link .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
        .main-content{margin-left:260px;padding:24px;}
        .topbar{background:white;border-radius:14px;padding:16px 24px;box-shadow:0 1px 10px rgba(0,0,0,0.05);margin-bottom:24px;}
        .table-card{background:white;border-radius:14px;box-shadow:0 1px 10px rgba(0,0,0,0.05);overflow:hidden;}
        .table-card-header{padding:20px 24px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;}
        .table thead th{background:#f8fafc;color:#64748b;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;border:none;padding:12px 16px;}
        .table tbody td{padding:14px 16px;font-size:14px;color:#374151;border-color:#f1f5f9;vertical-align:middle;}
        .badge-pending{background:#fef3c7;color:#d97706;padding:5px 12px;border-radius:50px;font-size:12px;font-weight:600;}
        .badge-confirmed{background:#d1fae5;color:#059669;padding:5px 12px;border-radius:50px;font-size:12px;font-weight:600;}
        .badge-cancelled{background:#fee2e2;color:#dc2626;padding:5px 12px;border-radius:50px;font-size:12px;font-weight:600;}
        .badge-completed{background:#dbeafe;color:#2563eb;padding:5px 12px;border-radius:50px;font-size:12px;font-weight:600;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand d-flex align-items-center gap-2">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#1a56db,#0ea5e9);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;"><i class="fas fa-heartbeat" style="font-size:16px;"></i></div>
        <span class="sidebar-brand-name">MedConnect</span>
    </div>
    <div class="sidebar-section">
        <div class="sidebar-section-label">Main Menu</div>
        <a th:href="@{/patient/dashboard}" class="nav-link"><span class="icon"><i class="fas fa-home"></i></span>Dashboard</a>
        <a th:href="@{/patient/book-appointment}" class="nav-link"><span class="icon"><i class="fas fa-calendar-plus"></i></span>Book Appointment</a>
        <a th:href="@{/patient/appointments}" class="nav-link active"><span class="icon"><i class="fas fa-calendar-check"></i></span>My Appointments</a>
        <a th:href="@{/patient/prescriptions}" class="nav-link"><span class="icon"><i class="fas fa-prescription-bottle-alt"></i></span>Prescriptions</a>
        <a th:href="@{/patient/rate-doctor}" class="nav-link"><span class="icon"><i class="fas fa-star"></i></span>Rate Doctor</a>
    </div>
    <div class="sidebar-section" style="position:absolute;bottom:0;width:100%;padding:16px 12px;">
        <a th:href="@{/logout}" class="nav-link" style="color:#ef4444!important;"><span class="icon"><i class="fas fa-sign-out-alt"></i></span>Logout</a>
    </div>
</div>
<div class="main-content">
    <div class="topbar d-flex justify-content-between align-items-center">
        <div>
            <h5 class="fw-bold mb-0" style="color:#0a2540;">My Appointments</h5>
            <p class="text-muted mb-0" style="font-size:13px;">View and manage all your appointments</p>
        </div>
        <a th:href="@{/patient/book-appointment}" class="btn btn-primary btn-sm" style="border-radius:8px;font-size:13px;padding:8px 16px;">
            <i class="fas fa-plus me-1"></i>Book New
        </a>
    </div>
    <div class="table-card">
        <div class="table-card-header">
            <h6 class="fw-bold mb-0" style="color:#0a2540;">All Appointments</h6>
        </div>
        <div class="table-responsive">
            <table class="table mb-0">
                <thead>
                    <tr><th>#</th><th>Doctor</th><th>Specialization</th><th>Date</th><th>Time</th><th>Reason</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody>
                    <tr th:each="appt, i : ${appointments}">
                        <td th:text="${i.count}"></td>
                        <td><div class="d-flex align-items-center gap-2"><div style="width:32px;height:32px;border-radius:8px;background:#eff6ff;display:flex;align-items:center;justify-content:center;color:#1a56db;font-size:13px;"><i class="fas fa-user-md"></i></div><span th:text="${appt.doctor != null ? 'Dr. ' + appt.doctor.user.name : 'N/A'}"></span></div></td>
                        <td th:text="${appt.doctor != null ? appt.doctor.specialization : 'N/A'}"></td>
                        <td th:text="${appt.apptDate}"></td>
                        <td th:text="${appt.timeSlot}"></td>
                        <td th:text="${appt.reason}"></td>
                        <td>
                            <span th:class="${appt.status.name() == 'PENDING' ? 'badge-pending' : appt.status.name() == 'CONFIRMED' ? 'badge-confirmed' : appt.status.name() == 'CANCELLED' ? 'badge-cancelled' : 'badge-completed'}" th:text="${appt.status}"></span>
                        </td>
                        <td>
                            <a th:if="${appt.status.name() == 'PENDING'}" th:href="@{/patient/cancel-appointment/{id}(id=${appt.id})}" class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border-radius:8px;font-size:12px;padding:5px 12px;" onclick="return confirm('Cancel?')"><i class="fas fa-times me-1"></i>Cancel</a>
                            <span th:if="${appt.status.name() != 'PENDING'}" class="text-muted" style="font-size:13px;">—</span>
                        </td>
                    </tr>
                    <tr th:if="${appointments == null or appointments.empty}">
                        <td colspan="8" class="text-center py-5"><div style="color:#94a3b8;"><i class="fas fa-calendar-times fa-2x mb-3 d-block"></i><div class="fw-500">No appointments found</div></div></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

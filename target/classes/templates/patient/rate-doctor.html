<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedConnect — Rate Doctor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; }
        .sidebar { width: 260px; min-height: 100vh; background: #0a2540; position: fixed; top: 0; left: 0; z-index: 100; }
        .sidebar-brand { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-brand-name { color: white; font-weight: 800; font-size: 1.1rem; }
        .sidebar-section { padding: 20px 12px 8px; }
        .sidebar-section-label { color: #64748b; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding: 0 8px; margin-bottom: 6px; }
        .nav-link { color: #94a3b8 !important; padding: 10px 12px !important; border-radius: 10px; margin-bottom: 2px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.06) !important; color: white !important; }
        .nav-link.active { background: rgba(26,86,219,0.3) !important; color: #60a5fa !important; }
        .nav-link .icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .main-content { margin-left: 260px; padding: 24px; }
        .topbar { background: white; border-radius: 14px; padding: 16px 24px; box-shadow: 0 1px 10px rgba(0,0,0,0.05); margin-bottom: 24px; }
        .form-card { background: white; border-radius: 14px; box-shadow: 0 1px 10px rgba(0,0,0,0.05); overflow: hidden; }
        .form-card-header { padding: 20px 24px; border-bottom: 1px solid #f1f5f9; background: #f8fafc; }
        .form-card-body { padding: 28px; }
        .form-label { font-weight: 500; font-size: 14px; color: #374151; margin-bottom: 6px; }
        .form-control, .form-select { border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 11px 16px; font-size: 14px; transition: all 0.2s; }
        .form-control:focus, .form-select:focus { border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }

        /* Star Rating */
        .star-container {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .star-container input[type="radio"] {
            display: none;
        }
        .star-container label {
            font-size: 40px;
            color: #e5e7eb;
            cursor: pointer;
            transition: color 0.2s;
        }
        .star-container label:hover {
            color: #f59e0b;
        }
        .star-container input[type="radio"]:checked + label {
            color: #f59e0b;
        }
        .star-label {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 6px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand d-flex align-items-center gap-2">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#1a56db,#0ea5e9);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;">
            <i class="fas fa-heartbeat" style="font-size:16px;"></i>
        </div>
        <span class="sidebar-brand-name">MedConnect</span>
    </div>
    <div class="sidebar-section">
        <div class="sidebar-section-label">Main Menu</div>
        <a th:href="@{/patient/dashboard}" class="nav-link">
            <span class="icon"><i class="fas fa-home"></i></span>Dashboard
        </a>
        <a th:href="@{/patient/book-appointment}" class="nav-link">
            <span class="icon"><i class="fas fa-calendar-plus"></i></span>Book Appointment
        </a>
        <a th:href="@{/patient/appointments}" class="nav-link">
            <span class="icon"><i class="fas fa-calendar-check"></i></span>My Appointments
        </a>
        <a th:href="@{/patient/prescriptions}" class="nav-link">
            <span class="icon"><i class="fas fa-prescription-bottle-alt"></i></span>Prescriptions
        </a>
        <a th:href="@{/patient/search-doctors}" class="nav-link">
            <span class="icon"><i class="fas fa-search"></i></span>Find Doctors
        </a>
        <a th:href="@{/patient/rate-doctor}" class="nav-link active">
            <span class="icon"><i class="fas fa-star"></i></span>Rate Doctor
        </a>
        <a th:href="@{/patient/profile}" class="nav-link">
            <span class="icon"><i class="fas fa-user"></i></span>My Profile
        </a>
    </div>
    <div style="position:absolute;bottom:0;width:100%;padding:16px 12px;">
        <a th:href="@{/logout}" class="nav-link" style="color:#ef4444!important;">
            <span class="icon"><i class="fas fa-sign-out-alt"></i></span>Logout
        </a>
    </div>
</div>

<div class="main-content">

    <div class="topbar">
        <h5 class="fw-bold mb-0" style="color:#0a2540;">Rate a Doctor</h5>
        <p class="text-muted mb-0" style="font-size:13px;">Share your experience with other patients</p>
    </div>

    <div th:if="${param.success}"
         class="alert d-flex align-items-center gap-2 mb-4"
         style="border-radius:12px;border:none;background:#d1fae5;color:#059669;">
        <i class="fas fa-check-circle"></i>
        Rating submitted successfully! Thank you for your feedback.
    </div>

    <div class="form-card">
        <div class="form-card-header">
            <h6 class="fw-bold mb-0" style="color:#0a2540;">
                <i class="fas fa-star text-warning me-2"></i>Submit Your Review
            </h6>
        </div>
        <div class="form-card-body">
            <form th:action="@{/patient/rate-doctor}" method="post">
                <div class="row g-4">

                    <div class="col-md-6">
                        <label class="form-label">Select Doctor <span class="text-danger">*</span></label>
                        <select name="doctorId" class="form-select" required>
                            <option value="">— Choose Doctor —</option>
                            <option th:each="doctor : ${doctors}"
                                    th:value="${doctor.id}"
                                    th:text="${doctor.user.name + ' (' + doctor.specialization + ')'}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label d-block">Rating <span class="text-danger">*</span></label>
                        <div class="star-container" id="starContainer">
                            <input type="radio" name="stars" id="star1" value="1">
                            <label for="star1"><i class="fas fa-star"></i></label>
                            <input type="radio" name="stars" id="star2" value="2">
                            <label for="star2"><i class="fas fa-star"></i></label>
                            <input type="radio" name="stars" id="star3" value="3">
                            <label for="star3"><i class="fas fa-star"></i></label>
                            <input type="radio" name="stars" id="star4" value="4">
                            <label for="star4"><i class="fas fa-star"></i></label>
                            <input type="radio" name="stars" id="star5" value="5">
                            <label for="star5"><i class="fas fa-star"></i></label>
                        </div>
                        <div class="star-label" id="starLabel">Click to rate</div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Your Review <span class="text-danger">*</span></label>
                        <textarea name="review" class="form-control" rows="4"
                                  placeholder="Share your experience with this doctor..."
                                  required></textarea>
                    </div>

                    <div class="col-12 pt-2">
                        <button type="submit" class="btn btn-primary px-4 py-2"
                                style="border-radius:10px;font-weight:600;background:linear-gradient(135deg,#1a56db,#0ea5e9);border:none;">
                            <i class="fas fa-paper-plane me-2"></i>Submit Review
                        </button>
                        <a th:href="@{/patient/dashboard}"
                           class="btn btn-light ms-2 px-4 py-2"
                           style="border-radius:10px;font-weight:600;">
                            Cancel
                        </a>
                    </div>

                </div>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Star rating with JavaScript
const labels = ['Terrible', 'Bad', 'Okay', 'Good', 'Excellent'];
const stars = document.querySelectorAll('.star-container label');
const starLabel = document.getElementById('starLabel');

stars.forEach((star, index) => {
    star.addEventListener('click', function() {
        // Reset all stars
        stars.forEach(s => s.style.color = '#e5e7eb');
        // Color selected and previous stars
        for (let i = 0; i <= index; i++) {
            stars[i].style.color = '#f59e0b';
        }
        starLabel.textContent = (index + 1) + ' Star' + (index > 0 ? 's' : '') + ' — ' + labels[index];
        starLabel.style.color = '#f59e0b';
        starLabel.style.fontWeight = '600';
    });

    star.addEventListener('mouseenter', function() {
        stars.forEach(s => s.style.color = '#e5e7eb');
        for (let i = 0; i <= index; i++) {
            stars[i].style.color = '#fcd34d';
        }
    });

    star.addEventListener('mouseleave', function() {
        // Restore selected state
        const checked = document.querySelector('.star-container input[type="radio"]:checked');
        if (checked) {
            const checkedIndex = parseInt(checked.value) - 1;
            stars.forEach(s => s.style.color = '#e5e7eb');
            for (let i = 0; i <= checkedIndex; i++) {
                stars[i].style.color = '#f59e0b';
            }
        } else {
            stars.forEach(s => s.style.color = '#e5e7eb');
        }
    });
});
</script>
</body>
</html>

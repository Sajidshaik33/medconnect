<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedConnect — My Schedule</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; }
        .sidebar { width: 260px; min-height: 100vh; background: #052e16; position: fixed; top: 0; left: 0; z-index: 100; }
        .sidebar-brand { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-brand-name { color: white; font-weight: 800; font-size: 1.1rem; }
        .sidebar-section { padding: 20px 12px 8px; }
        .sidebar-section-label { color: #4b7a5e; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding: 0 8px; margin-bottom: 6px; }
        .nav-link { color: #86efac !important; padding: 10px 12px !important; border-radius: 10px; margin-bottom: 2px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.06) !important; color: white !important; }
        .nav-link.active { background: rgba(16,185,129,0.2) !important; color: #4ade80 !important; }
        .nav-link .icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .main-content { margin-left: 260px; padding: 24px; }
        .topbar { background: white; border-radius: 14px; padding: 16px 24px; box-shadow: 0 1px 10px rgba(0,0,0,0.05); margin-bottom: 24px; }
        .form-card { background: white; border-radius: 14px; box-shadow: 0 1px 10px rgba(0,0,0,0.05); overflow: hidden; }
        .form-card-header { padding: 20px 24px; border-bottom: 1px solid #f1f5f9; background: #f8fafc; }
        .form-card-body { padding: 28px; }
        .form-label { font-weight: 500; font-size: 14px; color: #374151; margin-bottom: 6px; }
        .form-control, .form-select { border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 11px 16px; font-size: 14px; transition: all 0.2s; }
        .form-control:focus, .form-select:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        .day-btn { border: 2px solid #e5e7eb; border-radius: 10px; padding: 10px 16px; cursor: pointer; transition: all 0.2s; font-size: 13px; font-weight: 600; background: white; }
        .day-btn.selected { border-color: #10b981; background: #d1fae5; color: #059669; }
        .info-card { background: linear-gradient(135deg, #052e16, #10b981); color: white; border-radius: 14px; padding: 24px; margin-bottom: 24px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand d-flex align-items-center gap-2">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#10b981,#34d399);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;">
            <i class="fas fa-heartbeat" style="font-size:16px;"></i>
        </div>
        <span class="sidebar-brand-name">MedConnect</span>
    </div>
    <div class="sidebar-section">
        <div class="sidebar-section-label">Main Menu</div>
        <a th:href="@{/doctor/dashboard}" class="nav-link">
            <span class="icon"><i class="fas fa-home"></i></span>Dashboard
        </a>
        <a th:href="@{/doctor/appointments}" class="nav-link">
            <span class="icon"><i class="fas fa-calendar-check"></i></span>Appointments
        </a>
        <a th:href="@{/doctor/schedule}" class="nav-link active">
            <span class="icon"><i class="fas fa-clock"></i></span>My Schedule
        </a>
        <a th:href="@{/doctor/reviews}" class="nav-link">
            <span class="icon"><i class="fas fa-star"></i></span>My Reviews
        </a>
    </div>
    <div style="position:absolute;bottom:0;width:100%;padding:16px 12px;">
        <a th:href="@{/logout}" class="nav-link" style="color:#ef4444!important;">
            <span class="icon"><i class="fas fa-sign-out-alt"></i></span>Logout
        </a>
    </div>
</div>

<div class="main-content">

    <div class="topbar">
        <h5 class="fw-bold mb-0" style="color:#0a2540;">My Schedule</h5>
        <p class="text-muted mb-0" style="font-size:13px;">Update your availability and profile</p>
    </div>

    <!-- Success Message -->
    <div th:if="${param.updated}"
         class="alert d-flex align-items-center gap-2 mb-4"
         style="border-radius:12px;border:none;background:#d1fae5;color:#059669;">
        <i class="fas fa-check-circle"></i>
        Schedule updated successfully!
    </div>

    <!-- Current Info -->
    <div class="info-card mb-4">
        <div class="row">
            <div class="col-md-3">
                <div style="font-size:12px;opacity:0.7;margin-bottom:4px;">Doctor</div>
                <div class="fw-bold" style="font-size:16px;"
                     th:text="${user != null ? 'Dr. ' + user.name : 'N/A'}"></div>
            </div>
            <div class="col-md-3">
                <div style="font-size:12px;opacity:0.7;margin-bottom:4px;">Specialization</div>
                <div class="fw-bold" style="font-size:16px;"
                     th:text="${doctor != null ? doctor.specialization : 'N/A'}"></div>
            </div>
            <div class="col-md-3">
                <div style="font-size:12px;opacity:0.7;margin-bottom:4px;">Available Days</div>
                <div class="fw-bold" style="font-size:16px;"
                     th:text="${doctor != null && doctor.availableDays != null ? doctor.availableDays : 'Not set'}"></div>
            </div>
            <div class="col-md-3">
                <div style="font-size:12px;opacity:0.7;margin-bottom:4px;">Consultation Fees</div>
                <div class="fw-bold" style="font-size:16px;"
                     th:text="${doctor != null ? '₹' + doctor.fees : 'N/A'}"></div>
            </div>
        </div>
    </div>

    <!-- Update Form -->
    <div class="form-card">
        <div class="form-card-header">
            <h6 class="fw-bold mb-0" style="color:#0a2540;">
                <i class="fas fa-edit text-success me-2"></i>
                Update Schedule & Profile
            </h6>
        </div>
        <div class="form-card-body">
            <form th:action="@{/doctor/schedule}" method="post">

                <div class="row g-4">

                    <div class="col-md-6">
                        <label class="form-label">Specialization</label>
                        <input type="text" name="specialization"
                               class="form-control"
                               th:value="${doctor != null ? doctor.specialization : ''}"
                               placeholder="e.g. Cardiology" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Qualification</label>
                        <input type="text" name="qualification"
                               class="form-control"
                               th:value="${doctor != null ? doctor.qualification : ''}"
                               placeholder="e.g. MBBS MD" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Consultation Fees (₹)</label>
                        <input type="number" name="fees"
                               class="form-control"
                               th:value="${doctor != null ? doctor.fees : ''}"
                               placeholder="e.g. 500" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Available Days</label>
                        <select name="availableDays" class="form-select">
                            <option value="Mon-Fri" th:selected="${doctor != null && doctor.availableDays == 'Mon-Fri'}">Monday - Friday</option>
                            <option value="Mon-Sat" th:selected="${doctor != null && doctor.availableDays == 'Mon-Sat'}">Monday - Saturday</option>
                            <option value="Mon-Sun" th:selected="${doctor != null && doctor.availableDays == 'Mon-Sun'}">Monday - Sunday</option>
                            <option value="Tue-Sat" th:selected="${doctor != null && doctor.availableDays == 'Tue-Sat'}">Tuesday - Saturday</option>
                            <option value="Wed-Sun" th:selected="${doctor != null && doctor.availableDays == 'Wed-Sun'}">Wednesday - Sunday</option>
                        </select>
                    </div>

                    <div class="col-12 pt-2">
                        <button type="submit" class="btn btn-success px-4 py-2"
                                style="border-radius:10px;font-weight:600;">
                            <i class="fas fa-save me-2"></i>Update Schedule
                        </button>
                        <a th:href="@{/doctor/dashboard}"
                           class="btn btn-light ms-2 px-4 py-2"
                           style="border-radius:10px;font-weight:600;">
                            Cancel
                        </a>
                    </div>

                </div>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

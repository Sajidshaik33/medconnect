<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedConnect — Departments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; }
        .sidebar { width: 260px; min-height: 100vh; background: #1e0a3c; position: fixed; top: 0; left: 0; z-index: 100; }
        .sidebar-brand { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-brand-name { color: white; font-weight: 800; font-size: 1.1rem; }
        .sidebar-section { padding: 20px 12px 8px; }
        .sidebar-section-label { color: #6b4fa0; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding: 0 8px; margin-bottom: 6px; }
        .nav-link { color: #c4b5fd !important; padding: 10px 12px !important; border-radius: 10px; margin-bottom: 2px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.06) !important; color: white !important; }
        .nav-link.active { background: rgba(139,92,246,0.2) !important; color: #a78bfa !important; }
        .nav-link .icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .main-content { margin-left: 260px; padding: 24px; }
        .topbar { background: white; border-radius: 14px; padding: 16px 24px; box-shadow: 0 1px 10px rgba(0,0,0,0.05); margin-bottom: 24px; }
        .form-card { background: white; border-radius: 14px; box-shadow: 0 1px 10px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 24px; }
        .form-card-header { padding: 20px 24px; border-bottom: 1px solid #f1f5f9; background: #f8fafc; }
        .form-card-body { padding: 24px; }
        .table-card { background: white; border-radius: 14px; box-shadow: 0 1px 10px rgba(0,0,0,0.05); overflow: hidden; }
        .table thead th { background: #f8fafc; color: #64748b; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border: none; padding: 12px 16px; }
        .table tbody td { padding: 14px 16px; font-size: 14px; color: #374151; border-color: #f1f5f9; vertical-align: middle; }
        .form-control, .form-select { border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 11px 16px; font-size: 14px; transition: all 0.2s; }
        .form-control:focus { border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139,92,246,0.1); }
        .dept-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand d-flex align-items-center gap-2">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#8b5cf6,#a78bfa);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;">
            <i class="fas fa-heartbeat" style="font-size:16px;"></i>
        </div>
        <span class="sidebar-brand-name">MedConnect</span>
    </div>
    <div class="sidebar-section">
        <div class="sidebar-section-label">Admin Panel</div>
        <a th:href="@{/admin/dashboard}" class="nav-link">
            <span class="icon"><i class="fas fa-tachometer-alt"></i></span>Dashboard
        </a>
        <a th:href="@{/admin/doctors}" class="nav-link">
            <span class="icon"><i class="fas fa-user-md"></i></span>Doctors
        </a>
        <a th:href="@{/admin/patients}" class="nav-link">
            <span class="icon"><i class="fas fa-users"></i></span>Patients
        </a>
        <a th:href="@{/admin/appointments}" class="nav-link">
            <span class="icon"><i class="fas fa-calendar"></i></span>Appointments
        </a>
        <a th:href="@{/admin/departments}" class="nav-link active">
            <span class="icon"><i class="fas fa-hospital"></i></span>Departments
        </a>
    </div>
    <div style="position:absolute;bottom:0;width:100%;padding:16px 12px;">
        <a th:href="@{/logout}" class="nav-link" style="color:#ef4444!important;">
            <span class="icon"><i class="fas fa-sign-out-alt"></i></span>Logout
        </a>
    </div>
</div>

<div class="main-content">

    <div class="topbar d-flex justify-content-between align-items-center">
        <div>
            <h5 class="fw-bold mb-0" style="color:#0a2540;">Department Management</h5>
            <p class="text-muted mb-0" style="font-size:13px;">Add and manage hospital departments</p>
        </div>
    </div>

    <!-- Success Message -->
    <div th:if="${param.added}"
         class="alert d-flex align-items-center gap-2 mb-4"
         style="border-radius:12px;border:none;background:#d1fae5;color:#059669;">
        <i class="fas fa-check-circle"></i>
        Department added successfully!
    </div>

    <!-- Add Department Form -->
    <div class="form-card">
        <div class="form-card-header">
            <h6 class="fw-bold mb-0" style="color:#0a2540;">
                <i class="fas fa-plus text-purple me-2" style="color:#8b5cf6;"></i>
                Add New Department
            </h6>
        </div>
        <div class="form-card-body">
            <form th:action="@{/admin/departments}"
                  th:object="${department}"
                  method="post">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-500" style="font-size:14px;">Department Name</label>
                        <input type="text" th:field="*{deptName}"
                               class="form-control"
                               placeholder="e.g. Cardiology" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-500" style="font-size:14px;">HOD Name</label>
                        <input type="text" th:field="*{hodName}"
                               class="form-control"
                               placeholder="Head of Department">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-500" style="font-size:14px;">Description</label>
                        <input type="text" th:field="*{description}"
                               class="form-control"
                               placeholder="Brief description">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary"
                                style="border-radius:10px;padding:10px 24px;font-weight:600;background:linear-gradient(135deg,#8b5cf6,#a78bfa);border:none;">
                            <i class="fas fa-plus me-2"></i>Add Department
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Departments Table -->
    <div class="table-card">
        <div style="padding:20px 24px;border-bottom:1px solid #f1f5f9;">
            <h6 class="fw-bold mb-0" style="color:#0a2540;">
                <i class="fas fa-hospital me-2" style="color:#8b5cf6;"></i>
                All Departments
            </h6>
        </div>
        <div class="table-responsive">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Department</th>
                        <th>HOD</th>
                        <th>Description</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="dept, i : ${departments}">
                        <td th:text="${i.count}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="dept-icon" style="background:#f3f0ff;color:#8b5cf6;">
                                    <i class="fas fa-hospital"></i>
                                </div>
                                <span class="fw-bold" th:text="${dept.deptName}"></span>
                            </div>
                        </td>
                        <td th:text="${dept.hodName != null ? dept.hodName : '—'}"></td>
                        <td th:text="${dept.description != null ? dept.description : '—'}"></td>
                        <td>
                            <a th:href="@{/admin/delete-department/{id}(id=${dept.id})}"
                               class="btn btn-sm"
                               style="background:#fee2e2;color:#dc2626;border-radius:8px;font-size:12px;padding:5px 12px;"
                               onclick="return confirm('Delete department?')">
                                <i class="fas fa-trash me-1"></i>Delete
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${departments == null or departments.empty}">
                        <td colspan="5" class="text-center py-5" style="color:#94a3b8;">
                            <i class="fas fa-hospital fa-2x mb-3 d-block"></i>
                            No departments found! Add one above.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

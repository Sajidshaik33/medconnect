<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedConnect — My Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; }
        .sidebar { width: 260px; min-height: 100vh; background: #052e16; position: fixed; top: 0; left: 0; z-index: 100; }
        .sidebar-brand { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-brand-name { color: white; font-weight: 800; font-size: 1.1rem; }
        .sidebar-section { padding: 20px 12px 8px; }
        .sidebar-section-label { color: #4b7a5e; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding: 0 8px; margin-bottom: 6px; }
        .nav-link { color: #86efac !important; padding: 10px 12px !important; border-radius: 10px; margin-bottom: 2px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.06) !important; color: white !important; }
        .nav-link.active { background: rgba(16,185,129,0.2) !important; color: #4ade80 !important; }
        .nav-link .icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .main-content { margin-left: 260px; padding: 24px; }
        .topbar { background: white; border-radius: 14px; padding: 16px 24px; box-shadow: 0 1px 10px rgba(0,0,0,0.05); margin-bottom: 24px; }
        .avg-card {
            background: linear-gradient(135deg, #052e16, #10b981);
            color: white; border-radius: 14px;
            padding: 30px; text-align: center;
            margin-bottom: 24px;
        }
        .avg-number { font-size: 4rem; font-weight: 800; line-height: 1; }
        .review-card {
            background: white; border-radius: 14px;
            padding: 24px; margin-bottom: 16px;
            box-shadow: 0 1px 10px rgba(0,0,0,0.05);
            border-left: 4px solid #10b981;
        }
        .star { color: #f59e0b; font-size: 16px; }
        .star-empty { color: #e5e7eb; font-size: 16px; }
        .patient-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg, #1a56db, #0ea5e9);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 16px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand d-flex align-items-center gap-2">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#10b981,#34d399);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;">
            <i class="fas fa-heartbeat" style="font-size:16px;"></i>
        </div>
        <span class="sidebar-brand-name">MedConnect</span>
    </div>
    <div class="sidebar-section">
        <div class="sidebar-section-label">Main Menu</div>
        <a th:href="@{/doctor/dashboard}" class="nav-link">
            <span class="icon"><i class="fas fa-home"></i></span>Dashboard
        </a>
        <a th:href="@{/doctor/appointments}" class="nav-link">
            <span class="icon"><i class="fas fa-calendar-check"></i></span>Appointments
        </a>
        <a th:href="@{/doctor/schedule}" class="nav-link">
            <span class="icon"><i class="fas fa-clock"></i></span>My Schedule
        </a>
        <a th:href="@{/doctor/reviews}" class="nav-link active">
            <span class="icon"><i class="fas fa-star"></i></span>My Reviews
        </a>
    </div>
    <div style="position:absolute;bottom:0;width:100%;padding:16px 12px;">
        <a th:href="@{/logout}" class="nav-link" style="color:#ef4444!important;">
            <span class="icon"><i class="fas fa-sign-out-alt"></i></span>Logout
        </a>
    </div>
</div>

<div class="main-content">

    <div class="topbar">
        <h5 class="fw-bold mb-0" style="color:#0a2540;">My Reviews</h5>
        <p class="text-muted mb-0" style="font-size:13px;">Patient feedback and ratings</p>
    </div>

    <!-- Average Rating Card -->
    <div class="avg-card">
        <div class="avg-number" th:text="${#numbers.formatDecimal(avgRating, 1, 1)}">0.0</div>
        <div class="mt-2" style="font-size:28px;">
            <i class="fas fa-star" style="color:#fcd34d;"></i>
            <i class="fas fa-star" style="color:#fcd34d;"></i>
            <i class="fas fa-star" style="color:#fcd34d;"></i>
            <i class="fas fa-star" style="color:#fcd34d;"></i>
            <i class="fas fa-star" style="color:#fcd34d;"></i>
        </div>
        <div class="mt-2" style="opacity:0.8;font-size:14px;"
             th:text="${ratings != null ? ratings.size() + ' total reviews' : '0 reviews'}">
        </div>
    </div>

    <!-- Reviews List -->
    <div th:each="rating : ${ratings}">
        <div class="review-card">
            <div class="d-flex align-items-start gap-3">
                <div class="patient-avatar"
                     th:text="${rating.patient != null ? rating.patient.user.name.substring(0,1).toUpperCase() : 'P'}">
                </div>
                <div class="flex-grow-1">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="fw-bold" style="font-size:15px;color:#0a2540;"
                                 th:text="${rating.patient != null ? rating.patient.user.name : 'Patient'}">
                            </div>
                            <div style="margin-top:4px;">
                                <span th:each="i : ${#numbers.sequence(1, 5)}">
   									 <i th:class="${i <= rating.stars ? 'fas fa-star star' : 'fas fa-star star-empty'}"></i>
								</span>
                            </div>
                        </div>
                        <div style="font-size:12px;color:#94a3b8;"
                             th:text="${rating.createdAt != null ? #temporals.format(rating.createdAt, 'dd MMM yyyy') : ''}">
                        </div>
                    </div>
                    <p class="mb-0 mt-2" style="font-size:14px;color:#374151;"
                       th:text="${rating.review}">
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- No Reviews -->
    <div th:if="${ratings == null or ratings.empty}"
         class="text-center py-5"
         style="background:white;border-radius:14px;">
        <i class="fas fa-star fa-3x text-muted mb-3 d-block"></i>
        <div class="fw-bold text-muted">No reviews yet</div>
        <div class="text-muted" style="font-size:13px;">
            Patients will rate you after appointments
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

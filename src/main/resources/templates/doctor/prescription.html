<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Write Prescription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <style>
        *{font-family:'Inter',sans-serif;}body{background:#f1f5f9;}
        .sidebar{width:260px;min-height:100vh;background:#052e16;position:fixed;top:0;left:0;z-index:100;}
        .sidebar-brand{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
        .sidebar-brand-name{color:white;font-weight:800;font-size:1.1rem;}
        .sidebar-section{padding:20px 12px 8px;}
        .nav-link{color:#86efac!important;padding:10px 12px!important;border-radius:10px;margin-bottom:2px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;transition:all 0.2s;}
        .nav-link:hover{background:rgba(255,255,255,0.06)!important;color:white!important;}
        .nav-link .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
        .main-content{margin-left:260px;padding:24px;}
        .topbar{background:white;border-radius:14px;padding:16px 24px;box-shadow:0 1px 10px rgba(0,0,0,0.05);margin-bottom:24px;}
        .form-card{background:white;border-radius:14px;box-shadow:0 1px 10px rgba(0,0,0,0.05);overflow:hidden;}
        .patient-banner{background:linear-gradient(135deg,#052e16,#10b981);color:white;padding:24px 28px;border-radius:14px;margin-bottom:24px;}
        .form-label{font-weight:500;font-size:14px;color:#374151;margin-bottom:6px;}
        .form-control{border:1.5px solid #e5e7eb;border-radius:10px;padding:11px 16px;font-size:14px;transition:all 0.2s;}
        .form-control:focus{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,0.1);}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand d-flex align-items-center gap-2">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#10b981,#34d399);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;"><i class="fas fa-heartbeat" style="font-size:16px;"></i></div>
        <span class="sidebar-brand-name">MedConnect</span>
    </div>
    <div class="sidebar-section">
        <a th:href="@{/doctor/dashboard}" class="nav-link"><span class="icon"><i class="fas fa-home"></i></span>Dashboard</a>
        <a th:href="@{/doctor/appointments}" class="nav-link"><span class="icon"><i class="fas fa-calendar-check"></i></span>Appointments</a>
        <a th:href="@{/doctor/reviews}" class="nav-link"><span class="icon"><i class="fas fa-star"></i></span>My Reviews</a>
    </div>
    <div style="position:absolute;bottom:0;width:100%;padding:16px 12px;">
        <a th:href="@{/logout}" class="nav-link" style="color:#ef4444!important;"><span class="icon"><i class="fas fa-sign-out-alt"></i></span>Logout</a>
    </div>
</div>
<div class="main-content">
    <div class="topbar"><h5 class="fw-bold mb-0" style="color:#0a2540;"><i class="fas fa-prescription text-success me-2"></i>Write Prescription</h5></div>
    <div class="patient-banner">
        <div class="row">
            <div class="col-md-4"><div style="font-size:12px;opacity:0.7;margin-bottom:4px;">Patient</div><div class="fw-bold" style="font-size:16px;" th:text="${appointment != null && appointment.patient != null ? appointment.patient.user.name : 'N/A'}"></div></div>
            <div class="col-md-4"><div style="font-size:12px;opacity:0.7;margin-bottom:4px;">Date</div><div class="fw-bold" style="font-size:16px;" th:text="${appointment != null ? appointment.apptDate : 'N/A'}"></div></div>
            <div class="col-md-4"><div style="font-size:12px;opacity:0.7;margin-bottom:4px;">Reason</div><div class="fw-bold" style="font-size:16px;" th:text="${appointment != null ? appointment.reason : 'N/A'}"></div></div>
        </div>
    </div>
    <div class="form-card">
        <div style="padding:24px 28px;border-bottom:1px solid #f1f5f9;background:#f8fafc;"><h6 class="fw-bold mb-0">Prescription Details</h6></div>
        <div style="padding:28px;">
            <form th:action="@{/doctor/prescription/{id}(id=${appointment.id})}" th:object="${prescription}" method="post">
                <div class="row g-4">
                    <div class="col-12">
                        <label class="form-label">Medicines <span class="text-danger">*</span></label>
                        <textarea th:field="*{medicines}" class="form-control" rows="3" placeholder="List all medicines prescribed..." required></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Dosage <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{dosage}" class="form-control" placeholder="e.g. 1-0-1, Twice daily after meals" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Special Instructions</label>
                        <textarea th:field="*{instructions}" class="form-control" rows="3" placeholder="Any special instructions or follow-up notes..."></textarea>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-success px-4 py-2" style="border-radius:10px;font-weight:600;">
                            <i class="fas fa-save me-2"></i>Save Prescription
                        </button>
                        <a th:href="@{/doctor/appointments}" class="btn btn-light ms-2 px-4 py-2" style="border-radius:10px;font-weight:600;">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

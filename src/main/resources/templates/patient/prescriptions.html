<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedConnect — My Prescriptions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; }
        .sidebar { width: 260px; min-height: 100vh; background: #0a2540; position: fixed; top: 0; left: 0; z-index: 100; }
        .sidebar-brand { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-brand-name { color: white; font-weight: 800; font-size: 1.1rem; }
        .sidebar-section { padding: 20px 12px 8px; }
        .sidebar-section-label { color: #64748b; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding: 0 8px; margin-bottom: 6px; }
        .nav-link { color: #94a3b8 !important; padding: 10px 12px !important; border-radius: 10px; margin-bottom: 2px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.06) !important; color: white !important; }
        .nav-link.active { background: rgba(26,86,219,0.3) !important; color: #60a5fa !important; }
        .nav-link .icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .main-content { margin-left: 260px; padding: 24px; }
        .topbar { background: white; border-radius: 14px; padding: 16px 24px; box-shadow: 0 1px 10px rgba(0,0,0,0.05); margin-bottom: 24px; }
        .rx-card { background: white; border-radius: 14px; box-shadow: 0 1px 10px rgba(0,0,0,0.05); padding: 24px; border-left: 4px solid #1a56db; }
        .rx-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #f1f5f9; }
        .section-label { color: #94a3b8; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .btn-pdf { background: linear-gradient(135deg, #ef4444, #f97316); border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; color: white; transition: all 0.3s; }
        .btn-pdf:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(239,68,68,0.3); color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand d-flex align-items-center gap-2">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#1a56db,#0ea5e9);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;">
            <i class="fas fa-heartbeat" style="font-size:16px;"></i>
        </div>
        <span class="sidebar-brand-name">MedConnect</span>
    </div>
    <div class="sidebar-section">
        <div class="sidebar-section-label">Main Menu</div>
        <a th:href="@{/patient/dashboard}" class="nav-link">
            <span class="icon"><i class="fas fa-home"></i></span>Dashboard
        </a>
        <a th:href="@{/patient/book-appointment}" class="nav-link">
            <span class="icon"><i class="fas fa-calendar-plus"></i></span>Book Appointment
        </a>
        <a th:href="@{/patient/appointments}" class="nav-link">
            <span class="icon"><i class="fas fa-calendar-check"></i></span>My Appointments
        </a>
        <a th:href="@{/patient/prescriptions}" class="nav-link active">
            <span class="icon"><i class="fas fa-prescription-bottle-alt"></i></span>Prescriptions
        </a>
        <a th:href="@{/patient/search-doctors}" class="nav-link">
            <span class="icon"><i class="fas fa-search"></i></span>Find Doctors
        </a>
        <a th:href="@{/patient/rate-doctor}" class="nav-link">
            <span class="icon"><i class="fas fa-star"></i></span>Rate Doctor
        </a>
        <a th:href="@{/patient/profile}" class="nav-link">
            <span class="icon"><i class="fas fa-user"></i></span>My Profile
        </a>
    </div>
    <div style="position:absolute;bottom:0;width:100%;padding:16px 12px;">
        <a th:href="@{/logout}" class="nav-link" style="color:#ef4444!important;">
            <span class="icon"><i class="fas fa-sign-out-alt"></i></span>Logout
        </a>
    </div>
</div>

<div class="main-content">

    <div class="topbar">
        <h5 class="fw-bold mb-0" style="color:#0a2540;">My Prescriptions</h5>
        <p class="text-muted mb-0" style="font-size:13px;">
            All prescriptions issued by your doctors
        </p>
    </div>

    <div class="row g-4">
        <div class="col-md-6" th:each="rx : ${prescriptions}">
            <div class="rx-card">
                <div class="rx-header">
                    <div>
                        <div class="fw-bold" style="font-size:15px;color:#0a2540;"
                             th:text="${'Dr. ' + (rx.doctor != null ? rx.doctor.user.name : 'N/A')}">
                        </div>
                        <div class="text-muted" style="font-size:13px;"
                             th:text="${rx.doctor != null ? rx.doctor.specialization : ''}">
                        </div>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <div style="background:#eff6ff;color:#1a56db;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;"
                             th:text="${rx.issueDate}">
                        </div>
                        <a th:href="@{/prescription/pdf/{id}(id=${rx.id})}"
                           class="btn-pdf"
                           target="_blank">
                            <i class="fas fa-file-pdf me-1"></i>PDF
                        </a>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="section-label">Medicines</div>
                    <div style="font-size:14px;" th:text="${rx.medicines}"></div>
                </div>

                <div class="mb-3">
                    <div class="section-label">Dosage</div>
                    <div style="font-size:14px;" th:text="${rx.dosage}"></div>
                </div>

                <div th:if="${rx.instructions != null and !rx.instructions.isEmpty()}">
                    <div class="section-label">Instructions</div>
                    <div style="font-size:14px;" th:text="${rx.instructions}"></div>
                </div>
            </div>
        </div>

        <div class="col-12"
             th:if="${prescriptions == null or prescriptions.empty}">
            <div class="text-center py-5"
                 style="background:white;border-radius:14px;">
                <i class="fas fa-prescription-bottle-alt fa-3x text-muted mb-3 d-block"></i>
                <div class="fw-500 text-muted">No prescriptions yet</div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedConnect — Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <style>
        *{font-family:'Inter',sans-serif;}body{background:#f1f5f9;}
        .sidebar{width:260px;min-height:100vh;background:#0a2540;position:fixed;top:0;left:0;z-index:100;}
        .sidebar-brand{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
        .sidebar-brand-name{color:white;font-weight:800;font-size:1.1rem;}
        .sidebar-section{padding:20px 12px 8px;}
        .sidebar-section-label{color:#64748b;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:0 8px;margin-bottom:6px;}
        .nav-link{color:#94a3b8!important;padding:10px 12px!important;border-radius:10px;margin-bottom:2px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;transition:all 0.2s;}
        .nav-link:hover{background:rgba(255,255,255,0.06)!important;color:white!important;}
        .nav-link.active{background:rgba(26,86,219,0.3)!important;color:#60a5fa!important;}
        .nav-link .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
        .main-content{margin-left:260px;padding:24px;}
        .topbar{background:white;border-radius:14px;padding:16px 24px;box-shadow:0 1px 10px rgba(0,0,0,0.05);margin-bottom:24px;}
        .form-card{background:white;border-radius:14px;box-shadow:0 1px 10px rgba(0,0,0,0.05);overflow:hidden;}
        .form-card-header{padding:20px 28px;border-bottom:1px solid #f1f5f9;background:#f8fafc;}
        .form-card-body{padding:28px;}
        .form-label{font-weight:500;font-size:14px;color:#374151;margin-bottom:6px;}
        .form-control,.form-select{border:1.5px solid #e5e7eb;border-radius:10px;padding:11px 16px;font-size:14px;transition:all 0.2s;}
        .form-control:focus,.form-select:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,0.1);}
        .btn-submit{background:linear-gradient(135deg,#1a56db,#0ea5e9);border:none;border-radius:10px;padding:12px 28px;font-weight:600;font-size:14px;transition:all 0.3s;}
        .btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(26,86,219,0.3);}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand d-flex align-items-center gap-2">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#1a56db,#0ea5e9);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;">
            <i class="fas fa-heartbeat" style="font-size:16px;"></i>
        </div>
        <span class="sidebar-brand-name">MedConnect</span>
    </div>
    <div class="sidebar-section">
        <div class="sidebar-section-label">Main Menu</div>
        <a th:href="@{/patient/dashboard}" class="nav-link">
            <span class="icon"><i class="fas fa-home"></i></span>Dashboard
        </a>
        <a th:href="@{/patient/book-appointment}" class="nav-link active">
            <span class="icon"><i class="fas fa-calendar-plus"></i></span>Book Appointment
        </a>
        <a th:href="@{/patient/appointments}" class="nav-link">
            <span class="icon"><i class="fas fa-calendar-check"></i></span>My Appointments
        </a>
        <a th:href="@{/patient/prescriptions}" class="nav-link">
            <span class="icon"><i class="fas fa-prescription-bottle-alt"></i></span>Prescriptions
        </a>
        <a th:href="@{/patient/search-doctors}" class="nav-link">
            <span class="icon"><i class="fas fa-search"></i></span>Find Doctors
        </a>
        <a th:href="@{/patient/rate-doctor}" class="nav-link">
            <span class="icon"><i class="fas fa-star"></i></span>Rate Doctor
        </a>
        <a th:href="@{/patient/profile}" class="nav-link">
            <span class="icon"><i class="fas fa-user"></i></span>My Profile
        </a>
    </div>
    <div style="position:absolute;bottom:0;width:100%;padding:16px 12px;">
        <a th:href="@{/logout}" class="nav-link" style="color:#ef4444!important;">
            <span class="icon"><i class="fas fa-sign-out-alt"></i></span>Logout
        </a>
    </div>
</div>

<div class="main-content">
    <div class="topbar d-flex justify-content-between align-items-center">
        <div>
            <h5 class="fw-bold mb-0" style="color:#0a2540;">Book Appointment</h5>
            <p class="text-muted mb-0" style="font-size:13px;">Schedule a new appointment with a doctor</p>
        </div>
    </div>

    <!-- Error Message -->
    <div th:if="${error}"
         class="alert mb-4"
         style="border-radius:12px;border:none;background:#fee2e2;color:#dc2626;padding:16px;">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="form-card">
        <div class="form-card-header">
            <h6 class="fw-bold mb-0" style="color:#0a2540;">
                <i class="fas fa-calendar-plus text-primary me-2"></i>Appointment Details
            </h6>
        </div>
        <div class="form-card-body">
            <form th:action="@{/patient/book-appointment}"
                  th:object="${appointment}" method="post">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label">Select Doctor <span class="text-danger">*</span></label>
                        <select th:field="*{doctor.id}" class="form-select" required>
                            <option value="">— Choose a Doctor —</option>
                            <option th:each="doctor : ${doctors}"
                                    th:value="${doctor.id}"
                                    th:text="${doctor.user.name + ' (' + doctor.specialization + ')'}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Appointment Date <span class="text-danger">*</span></label>
                        <input type="date" th:field="*{apptDate}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Time Slot <span class="text-danger">*</span></label>
                        <select th:field="*{timeSlot}" class="form-select" required>
                            <option value="">— Select Time —</option>
                            <option value="09:00 AM">09:00 AM</option>
                            <option value="10:00 AM">10:00 AM</option>
                            <option value="11:00 AM">11:00 AM</option>
                            <option value="12:00 PM">12:00 PM</option>
                            <option value="02:00 PM">02:00 PM</option>
                            <option value="03:00 PM">03:00 PM</option>
                            <option value="04:00 PM">04:00 PM</option>
                            <option value="05:00 PM">05:00 PM</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Reason for Visit <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{reason}" class="form-control"
                               placeholder="Brief reason for visit" required>
                    </div>
                    <div class="col-12 pt-2">
                        <button type="submit" class="btn btn-primary btn-submit text-white">
                            <i class="fas fa-calendar-check me-2"></i>Confirm Appointment
                        </button>
                        <a th:href="@{/patient/dashboard}" class="btn btn-light ms-2"
                           style="border-radius:10px;padding:12px 24px;font-weight:600;">
                            Cancel
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

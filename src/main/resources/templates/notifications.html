<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedConnect — Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; }
        .topnav {
            background: #0a2540;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .brand { color: white; font-weight: 800; font-size: 1.2rem; text-decoration: none; }
        .main-content { max-width: 800px; margin: 0 auto; padding: 0 24px 24px; }
        .notif-card {
            background: white;
            border-radius: 14px;
            padding: 20px 24px;
            margin-bottom: 12px;
            box-shadow: 0 1px 10px rgba(0,0,0,0.05);
            border-left: 4px solid #1a56db;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s;
        }
        .notif-card.unread {
            background: #eff6ff;
            border-left-color: #1a56db;
        }
        .notif-card.read {
            background: white;
            border-left-color: #e5e7eb;
        }
        .notif-icon {
            width: 46px; height: 46px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .notif-icon.booked { background: #eff6ff; color: #1a56db; }
        .notif-icon.confirmed { background: #d1fae5; color: #059669; }
        .notif-icon.cancelled { background: #fee2e2; color: #dc2626; }
        .notif-icon.completed { background: #dbeafe; color: #2563eb; }
        .notif-icon.new { background: #fef3c7; color: #d97706; }
        .notif-message { font-size: 14px; color: #374151; flex-grow: 1; }
        .notif-time { font-size: 12px; color: #94a3b8; }
        .btn-delete { background: #fee2e2; color: #dc2626; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<!-- Top Nav -->
<div class="topnav">
    <a href="javascript:history.back()" class="brand">
        <i class="fas fa-heartbeat me-2"></i>MedConnect
    </a>
    <a href="javascript:history.back()"
       class="btn btn-sm"
       style="background:rgba(255,255,255,0.1);color:white;border-radius:8px;padding:8px 16px;">
        <i class="fas fa-arrow-left me-2"></i>Go Back
    </a>
</div>

<div class="main-content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0" style="color:#0a2540;">Notifications</h4>
            <p class="text-muted mb-0" style="font-size:13px;">
                All your recent notifications
            </p>
        </div>
        <div th:if="${unreadCount > 0}"
             style="background:#eff6ff;color:#1a56db;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;">
            <i class="fas fa-bell me-1"></i>
            <span th:text="${unreadCount}"></span> unread
        </div>
    </div>

    <!-- Notifications List -->
    <div th:each="notif : ${notifications}">
        <div th:class="${!notif.read ? 'notif-card unread' : 'notif-card read'}">

            <!-- Icon based on type -->
            <div th:class="${notif.type == 'APPOINTMENT_BOOKED' ? 'notif-icon booked' :
                notif.type == 'APPOINTMENT_CONFIRMED' ? 'notif-icon confirmed' :
                notif.type == 'APPOINTMENT_CANCELLED' ? 'notif-icon cancelled' :
                notif.type == 'APPOINTMENT_COMPLETED' ? 'notif-icon completed' :
                'notif-icon new'}">
                <i th:class="${notif.type == 'APPOINTMENT_BOOKED' ? 'fas fa-calendar-plus' :
                    notif.type == 'APPOINTMENT_CONFIRMED' ? 'fas fa-check-circle' :
                    notif.type == 'APPOINTMENT_CANCELLED' ? 'fas fa-times-circle' :
                    notif.type == 'APPOINTMENT_COMPLETED' ? 'fas fa-check-double' :
                    'fas fa-bell'}">
                </i>
            </div>

            <!-- Message -->
            <div class="flex-grow-1">
                <div class="notif-message" th:text="${notif.message}"></div>
                <div class="notif-time mt-1"
                     th:text="${#temporals.format(notif.createdAt, 'dd MMM yyyy, hh:mm a')}">
                </div>
            </div>

            <!-- Unread dot -->
            <div th:if="${!notif.read}"
                 style="width:10px;height:10px;border-radius:50%;background:#1a56db;flex-shrink:0;">
            </div>

            <!-- Delete -->
            <a th:href="@{/notifications/delete/{id}(id=${notif.id})}"
               class="btn-delete"
               onclick="return confirm('Delete?')">
                <i class="fas fa-trash"></i>
            </a>

        </div>
    </div>

    <!-- Empty -->
    <div th:if="${notifications == null or notifications.empty}"
         class="text-center py-5"
         style="background:white;border-radius:14px;">
        <i class="fas fa-bell-slash fa-3x text-muted mb-3 d-block"></i>
        <div class="fw-bold text-muted">No notifications yet</div>
        <div class="text-muted" style="font-size:13px;">
            You'll see notifications here when something happens
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedConnect — Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; padding: 30px 0; }
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        .card-header-custom {
            background: linear-gradient(135deg, #0a2540, #1a56db);
            padding: 35px 40px;
            color: white;
            text-align: center;
        }
        .card-body-custom { padding: 35px 40px; }
        .form-label { font-weight: 500; font-size: 14px; color: #374151; margin-bottom: 6px; }
        .form-control, .form-select {
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            padding: 11px 16px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #1a56db;
            box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
        }
        .role-card {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .role-card:hover { border-color: #1a56db; background: #f0f4ff; }
        .role-card.selected { border-color: #1a56db; background: #eff6ff; }
        .role-card input[type="radio"] { display: none; }
        .role-icon { font-size: 28px; margin-bottom: 8px; }
        .btn-register {
            background: linear-gradient(135deg, #1a56db, #0ea5e9);
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(26,86,219,0.35);
        }
        .alert { border-radius: 10px; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="register-card mx-auto">
        <div class="card-header-custom">
            <div style="width:60px;height:60px;background:rgba(255,255,255,0.15);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
                <i class="fas fa-heartbeat fs-3"></i>
            </div>
            <h4 class="fw-bold mb-1">Create your account</h4>
            <p class="mb-0" style="opacity:0.8;font-size:14px;">Join MedConnect today</p>
        </div>
        <div class="card-body-custom">

            <div th:if="${error}" class="alert alert-danger py-2 mb-3">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" th:field="*{name}" class="form-control"
                           placeholder="Dr. John Smith / John Smith" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control"
                           placeholder="you@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-control"
                           placeholder="Min. 6 characters" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Register as</label>
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="role-card w-100" id="patientCard">
                                <input type="radio" th:field="*{role}" value="PATIENT"
                                       onchange="selectRole('patientCard')" checked>
                                <div class="role-icon text-primary">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div class="fw-600" style="font-size:14px;">Patient</div>
                                <div class="text-muted" style="font-size:12px;">Book appointments</div>
                            </label>
                        </div>
                        <div class="col-6">
                            <label class="role-card w-100" id="doctorCard">
                                <input type="radio" th:field="*{role}" value="DOCTOR"
                                       onchange="selectRole('doctorCard')">
                                <div class="role-icon text-success">
                                    <i class="fas fa-user-md"></i>
                                </div>
                                <div class="fw-600" style="font-size:14px;">Doctor</div>
                                <div class="text-muted" style="font-size:12px;">Manage patients</div>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-register w-100 text-white">
                    Create Account <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </form>

            <p class="text-center mt-3 mb-0" style="font-size:14px;color:#6b7280;">
                Already have an account?
                <a th:href="@{/login}" class="text-primary fw-600 text-decoration-none">Sign in</a>
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function selectRole(cardId) {
    document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
    document.getElementById(cardId).classList.add('selected');
}
document.getElementById('patientCard').classList.add('selected');
</script>
</body>
</html>
